<nav class="relative flex w-full items-center justify-between p-4 bg-black z-[100]">

    <div class="flex flex-1 justify-start">
        <h2 class="text-white text-[1.5rem] font-bold">OIL SKIN</h2>
    </div>

    <div class="flex lg:hidden">
        <button id="mobileMenuButton" class="text-white focus:outline-none">
            <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </button>
    </div>

    <div class="hidden lg:flex flex-1 justify-center">
        <div class="flex flex-row gap-8 items-center text-white text-md font-medium">
            <a href="{{ url_for('main_blueprint.index') }}" class="transition duration-300 ease-in-out hover:text-[#CEB06E]">Inicio</a>
            <a href="{{ url_for('main_blueprint.about') }}"
                class="whitespace-nowrap transition duration-300 ease-in-out hover:text-[#CEB06E]">Sobre
                Nosotros</a>

            <div class="relative group">
                <button id="dropdownButton"
                    class="flex items-center gap-2 py-2 text-white font-medium focus:outline-none">
                    <span>Categorías</span>
                    <svg class="h-4 w-4 transition-transform group-hover:rotate-180" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
                <div id="dropdownMenu"
                    class="hidden group-hover:block absolute left-0 w-48 rounded-md shadow-lg bg-black border border-slate-700 z-[110]">
                    <div class="py-1">
                        {% for categoria in categorias %}
                        <a href="{{ url_for('main_blueprint.show_category', category_name=categoria.nombre_categoria) }}"
                            class="block px-4 py-2 text-sm text-white hover:bg-slate-900">{{ categoria.nombre_categoria }}</a>
                        {% endfor %}
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="hidden lg:flex flex-1 justify-end gap-5 text-white text-md font-medium">
        <a href="{{ url_for('auth_blueprint.register') }}"
            class="border border-slate-600 px-4 py-2 rounded-2xl transition hover:text-[#CEB06E] hover:border-[#CEB06E]">Regístrate</a>
        <a href="{{ url_for('auth_blueprint.login') }}"
            class="border border-slate-600 px-4 py-2 rounded-2xl transition hover:text-[#CEB06E] hover:border-[#CEB06E]">Inicia
            Sesión</a>
    </div>

    <div id="mobileMenu"
        class="hidden absolute top-full left-0 w-full bg-black/95 flex-col p-6 gap-4 text-white lg:hidden border-t border-slate-800">
        <a href="{{ url_for('main_blueprint.index') }}" class="text-lg border-b border-slate-800 pb-2">Inicio</a>
        <a href="{{ url_for('main_blueprint.about') }}" class="text-lg border-b border-slate-800 pb-2">Sobre Nosotros</a>
        <div class="flex flex-col gap-2">
            <span class="text-slate-400 text-sm uppercase tracking-widest">Categorías</span>
            {% for categoria in categorias %}
            <a href="{{ url_for('main_blueprint.show_category', category_name=categoria.nombre_categoria) }}" class="pl-4 transition duration-300 ease-in-out hover:text-[#CEB06E]">{{ categoria.nombre_categoria }}</a>
            {% endfor %}
        </div>
        <div class="flex flex-col gap-3 mt-4">
            <a href="{{ url_for('auth_blueprint.login') }}" class="text-center bg-[#CEB06E] text-black py-2 rounded-xl font-bold">Inicia Sesión</a>
            <a href="{{ url_for('auth_blueprint.register') }}" class="text-center border border-slate-600 py-2 rounded-xl">Regístrate</a>
        </div>
    </div>
</nav>

<script>
    // Lógica para abrir/cerrar menú móvil
    const btn = document.getElementById('mobileMenuButton');
    const menu = document.getElementById('mobileMenu');

    btn.addEventListener('click', () => {
        menu.classList.toggle('hidden');
        menu.classList.toggle('flex');
    });
</script>
<script>
    const dropdownButton = document.getElementById('dropdownButton');
    const dropdownMenu = document.getElementById('dropdownMenu');


    dropdownButton.addEventListener('click', () => {
        dropdownMenu.classList.toggle('hidden');
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (event) => {
        if (!dropdownButton.contains(event.target) && !dropdownMenu.contains(event.target)) {
            dropdownMenu.classList.add('hidden');
        }
    });




    dropdownMenu.querySelectorAll('button').forEach(item => {
        item.addEventListener('click', () => {
            const url = item.getAttribute('data-html')
            if (url) {
                window.location.href = url;
            }

            dropdownMenu.classList.add('hidden');
        });
    });
</script>
